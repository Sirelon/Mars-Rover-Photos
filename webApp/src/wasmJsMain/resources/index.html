<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Rover Photos</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #D84315;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: fadeIn 0.4s ease-in;
        }

        #splash img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        #splash-title {
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

        #ComposeTarget {
            position: fixed;
            inset: 0;
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        #ComposeTarget.ready { opacity: 1; }

        @media (prefers-color-scheme: dark) {
            body { background: #1A0A00; }
        }
    </style>
</head>
<body>
    <div id="splash">
        <img src="icon-192.png" alt="Mars Rover Photos">
        <span id="splash-title">Mars Rover Photos</span>
        <div class="spinner"></div>
    </div>

    <canvas id="ComposeTarget"></canvas>

    <script src="marsRoverPhotosWeb.js"></script>
    <script>
        // Hide splash and reveal canvas once Compose is ready
        const canvas = document.getElementById('ComposeTarget');
        const splash = document.getElementById('splash');

        const observer = new MutationObserver(() => {
            if (canvas.width > 0) {
                canvas.classList.add('ready');
                splash.style.transition = 'opacity 0.3s';
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 300);
                observer.disconnect();
            }
        });
        observer.observe(canvas, { attributes: true, attributeFilter: ['width'] });
    </script>
</body>
</html>
