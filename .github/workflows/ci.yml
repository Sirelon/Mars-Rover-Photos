name: CI

on:
  push:
    branches:
      - master
      - "Sirelon/**"
  pull_request:
    branches:
      - master
      - Sirelon/kmp-migration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Lint
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Android ────────────────────────────────────────────────────────────
      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      # ── iOS shared framework ───────────────────────────────────────────────
      - name: Link iOS simulator framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      # ── Unit tests ─────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew :shared:testDebugUnitTest

      # ── Static analysis ────────────────────────────────────────────────────
      - name: Detekt
        run: ./gradlew detekt

      # ── Desktop (informational — failures don't block the build) ───────────
      - name: Compile Desktop
        run: ./gradlew :shared:compileKotlinDesktop
        continue-on-error: true
