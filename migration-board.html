<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mars Rover Photos — KMP Migration Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1f2630;
    --border: #2c333d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #d2a8ff;
    --todo: #6e7681;
    --review: #f0b400;
    --done: #3fb950;
    --screen: #58a6ff;
    --ios: #f78166;
    --prereq: #d2a8ff;
    --android: #3fb950;
    --shadow: 0 4px 14px rgba(0,0,0,.35);
}
* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    min-height: 100vh;
}
header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    background: linear-gradient(180deg, #161b22, #0e1116);
    position: sticky;
    top: 0;
    z-index: 10;
}
header h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -.01em;
}
header h1 .sub {
    color: var(--muted);
    font-weight: 400;
    margin-left: 8px;
}
.progress {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 480px;
}
.progress-bar {
    flex: 1;
    height: 8px;
    background: var(--panel-2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--done), #2ea043);
    transition: width .3s ease;
}
.progress-text {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    white-space: nowrap;
}
.toolbar {
    display: flex;
    gap: 8px;
}
button.btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
}
button.btn:hover {
    background: #2a313c;
    border-color: #3a424d;
}
button.btn.danger:hover {
    background: #5a1d1d;
    border-color: #8b3a3a;
    color: #ffb4b4;
}
.legend {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    flex-wrap: wrap;
}
.legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
}
.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 16px;
    align-items: start;
}
.column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    max-height: calc(100vh - 180px);
}
.column-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.column-title {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: .04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
}
.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}
.status-dot.todo { background: var(--todo); }
.status-dot.review { background: var(--review); }
.status-dot.done { background: var(--done); }
.count {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
}
.cards {
    padding: 10px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 80px;
}
.cards.drag-over {
    background: rgba(88, 166, 255, 0.05);
    outline: 2px dashed rgba(88, 166, 255, 0.3);
    outline-offset: -8px;
    border-radius: 8px;
}
.card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: grab;
    transition: border-color .15s, transform .1s, box-shadow .15s;
    user-select: none;
}
.card:hover {
    border-color: #3a424d;
    box-shadow: var(--shadow);
}
.card.dragging {
    opacity: .4;
    cursor: grabbing;
}
.card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}
.badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: .02em;
    flex-shrink: 0;
}
.badge.screen { background: rgba(88,166,255,.15); color: var(--screen); border-color: rgba(88,166,255,.35); }
.badge.ios { background: rgba(247,129,102,.15); color: var(--ios); border-color: rgba(247,129,102,.35); }
.badge.prereq { background: rgba(210,168,255,.15); color: var(--prereq); border-color: rgba(210,168,255,.35); }
.badge.android { background: rgba(63,185,80,.15); color: var(--android); border-color: rgba(63,185,80,.35); }
.estimate {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
}
.card-title {
    font-weight: 600;
    font-size: 14px;
    margin: 2px 0 4px;
    line-height: 1.3;
}
.card-summary {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 4px;
}
.tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
}
.tag {
    font-size: 10.5px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
}
.tag.blocked { color: #ffb4b4; border-color: rgba(255,140,140,.3); background: rgba(255,80,80,.08); }
.tag.blocks { color: #d2a8ff; border-color: rgba(210,168,255,.3); background: rgba(210,168,255,.08); }
.card details {
    margin-top: 8px;
    border-top: 1px dashed var(--border);
    padding-top: 8px;
}
.card details > summary {
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    list-style: none;
    user-select: none;
}
.card details > summary::-webkit-details-marker { display: none; }
.card details > summary::before {
    content: '▸ ';
    display: inline-block;
    width: 12px;
    transition: transform .1s;
}
.card details[open] > summary::before {
    content: '▾ ';
}
.dod {
    list-style: none;
    padding: 0;
    margin: 6px 0 0;
    font-size: 12.5px;
}
.dod li {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 3px 0;
    line-height: 1.4;
}
.dod input[type="checkbox"] {
    margin: 3px 0 0;
    cursor: pointer;
    flex-shrink: 0;
}
.dod label {
    cursor: pointer;
    flex: 1;
}
.dod input:checked + label {
    text-decoration: line-through;
    color: var(--muted);
}
.empty {
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
    text-align: center;
    padding: 18px 8px;
}
@media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
    .column { max-height: none; }
    header { flex-wrap: wrap; }
    .progress { order: 3; width: 100%; max-width: none; }
}
footer {
    padding: 12px 24px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    text-align: center;
}
footer a {
    color: var(--accent);
    text-decoration: none;
}
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
    <h1>Mars Rover Photos<span class="sub">— KMP Migration Board</span></h1>
    <div class="progress">
        <span class="progress-text" id="progressText">0 / 0</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="toolbar">
        <button class="btn" id="collapseBtn" title="Collapse all card details">Collapse all</button>
        <button class="btn" id="expandBtn" title="Expand all card details">Expand all</button>
        <button class="btn danger" id="resetBtn" title="Reset board to defaults — clears your status & checkbox state">Reset</button>
    </div>
</header>

<div class="legend">
    <span><span class="legend-dot" style="background:var(--prereq)"></span>Prereq (S0)</span>
    <span><span class="legend-dot" style="background:var(--screen)"></span>Screen (S1–S8)</span>
    <span><span class="legend-dot" style="background:var(--android)"></span>Android-only (S9)</span>
    <span><span class="legend-dot" style="background:var(--ios)"></span>iOS (§6.1–6.4)</span>
    <span style="margin-left:auto">Drag cards between columns. State saved in browser localStorage.</span>
</div>

<div class="board">
    <section class="column" data-status="todo">
        <div class="column-header">
            <div class="column-title"><span class="status-dot todo"></span>To Do</div>
            <span class="count" id="count-todo">0</span>
        </div>
        <div class="cards" id="col-todo" data-status="todo"></div>
    </section>

    <section class="column" data-status="review">
        <div class="column-header">
            <div class="column-title"><span class="status-dot review"></span>In Review</div>
            <span class="count" id="count-review">0</span>
        </div>
        <div class="cards" id="col-review" data-status="review"></div>
    </section>

    <section class="column" data-status="done">
        <div class="column-header">
            <div class="column-title"><span class="status-dot done"></span>Done</div>
            <span class="count" id="count-done">0</span>
        </div>
        <div class="cards" id="col-done" data-status="done"></div>
    </section>
</div>

<footer>
    Source of truth: <a href="KMP_MIGRATION_PLAN.md">KMP_MIGRATION_PLAN.md</a> · Update the plan when a ticket lands.
</footer>

// ---------------------------------------------------------------------------
// Persistence
// ---------------------------------------------------------------------------
const STORAGE_KEY = 'mars-rover-migration-board-v1';

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        return JSON.parse(raw);
    } catch (e) {
        console.warn('Failed to load state', e);
        return {};
    }
}

function saveState(state) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
        console.warn('Failed to save state', e);
    }
}

let state = loadState();

function getStatus(id) {
    return (state[id] && state[id].status) || 'todo';
}

function setStatus(id, status) {
    state[id] = state[id] || {};
    state[id].status = status;
    saveState(state);
}

function isChecked(id, idx) {
    return !!(state[id] && state[id].checked && state[id].checked[idx]);
}

function setChecked(id, idx, val) {
    state[id] = state[id] || {};
    state[id].checked = state[id].checked || {};
    state[id].checked[idx] = val;
    saveState(state);
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function renderCard(t) {
    const checkedCount = (state[t.id] && state[t.id].checked)
        ? Object.values(state[t.id].checked).filter(Boolean).length
        : 0;

    const tags = [];
    if (t.blockedBy && t.blockedBy.length) {
        const open = t.blockedBy.filter(b => getStatus(b) !== 'done');
        if (open.length) {
            tags.push(`<span class="tag blocked" title="Blocked by tickets not yet done">⛔ blocked by ${open.join(', ')}</span>`);
        }
    }
    if (t.blocks && t.blocks.length) {
        tags.push(`<span class="tag blocks" title="Tickets that depend on this one">↳ blocks ${t.blocks.length}</span>`);
    }
    if (t.relatedBy && t.relatedBy.length) {
        tags.push(`<span class="tag" title="Related tickets (not strictly blocking)">↔ ${t.relatedBy.join(', ')}</span>`);
    }

    const dodHtml = t.dod.map((item, i) => `
        <li>
            <input type="checkbox" id="dod-${t.id}-${i}" data-ticket="${t.id}" data-idx="${i}" ${isChecked(t.id, i) ? 'checked' : ''}>
            <label for="dod-${t.id}-${i}">${escapeHtml(item)}</label>
        </li>
    `).join('');

    const card = document.createElement('article');
    card.className = 'card';
    card.draggable = true;
    card.dataset.id = t.id;
    card.innerHTML = `
        <div class="card-top">
            <span class="badge ${t.kind}">${escapeHtml(t.id)}</span>
            <span class="estimate">${escapeHtml(t.estimate)}</span>
        </div>
        <div class="card-title">${escapeHtml(t.title)}</div>
        <div class="card-summary">${escapeHtml(t.summary)}</div>
        ${tags.length ? `<div class="tags">${tags.join('')}</div>` : ''}
        <details>
            <summary>Definition of Done · ${checkedCount}/${t.dod.length}</summary>
            <ul class="dod">${dodHtml}</ul>
        </details>
    `;
    return card;
}

function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function render() {
    const cols = {
        todo: document.getElementById('col-todo'),
        review: document.getElementById('col-review'),
        done: document.getElementById('col-done'),
    };
    Object.values(cols).forEach(c => c.innerHTML = '');

    const counts = { todo: 0, review: 0, done: 0 };
    DEFAULT_TICKETS.forEach(t => {
        const status = getStatus(t.id);
        const card = renderCard(t);
        cols[status].appendChild(card);
        counts[status]++;
    });

    Object.entries(counts).forEach(([k, v]) => {
        document.getElementById('count-' + k).textContent = v;
        if (v === 0) {
            cols[k].innerHTML = '<div class="empty">Drop tickets here</div>';
        }
    });

    const total = DEFAULT_TICKETS.length;
    const done = counts.done;
    document.getElementById('progressText').textContent = `${done} / ${total} done`;
    document.getElementById('progressFill').style.width = ((done / total) * 100) + '%';

    wireCards();
}

// ---------------------------------------------------------------------------
// Drag & drop
// ---------------------------------------------------------------------------
let draggedId = null;

function wireCards() {
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('dragstart', e => {
            draggedId = card.dataset.id;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            // Required for Firefox
            e.dataTransfer.setData('text/plain', draggedId);
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            draggedId = null;
            document.querySelectorAll('.cards.drag-over').forEach(c => c.classList.remove('drag-over'));
        });
    });

    document.querySelectorAll('input[type="checkbox"][data-ticket]').forEach(cb => {
        cb.addEventListener('change', () => {
            setChecked(cb.dataset.ticket, parseInt(cb.dataset.idx, 10), cb.checked);
            // Update DoD count in summary
            const ticket = cb.dataset.ticket;
            const cardEl = cb.closest('.card');
            const summary = cardEl.querySelector('details > summary');
            const ticketDef = DEFAULT_TICKETS.find(t => t.id === ticket);
            const cnt = cardEl.querySelectorAll('input[type="checkbox"]:checked').length;
            summary.textContent = `Definition of Done · ${cnt}/${ticketDef.dod.length}`;
        });
    });
}

document.querySelectorAll('.cards').forEach(col => {
    col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', e => {
        if (!col.contains(e.relatedTarget)) {
            col.classList.remove('drag-over');
        }
    });
    col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        if (!draggedId) return;
        const newStatus = col.dataset.status;
        if (getStatus(draggedId) === newStatus) return;
        setStatus(draggedId, newStatus);
        render();
    });
});

// ---------------------------------------------------------------------------
// Toolbar
// ---------------------------------------------------------------------------
document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Reset all ticket statuses and DoD checkboxes? Your changes will be lost.')) {
        localStorage.removeItem(STORAGE_KEY);
        state = {};
        render();
    }
});

document.getElementById('expandBtn').addEventListener('click', () => {
    document.querySelectorAll('.card details').forEach(d => d.open = true);
});

document.getElementById('collapseBtn').addEventListener('click', () => {
    document.querySelectorAll('.card details').forEach(d => d.open = false);
});

// Init
render();
</script>

</body>
</html>
